<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trợ Lý Học Tập - Xuân Lâm V20.0 🚀</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
    body { font-family: 'Nunito', sans-serif; }
    
    .shake {
      animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
    }
    @keyframes shake {
      10%, 90% { transform: translate3d(-1px, 0, 0); }
      20%, 80% { transform: translate3d(2px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
      40%, 60% { transform: translate3d(4px, 0, 0); }
    }
    
    .pop-in {
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* Fancy progress bar stripe */
    .progress-stripes {
      background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.15) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.15) 50%, rgba(255, 255, 255, 0.15) 75%, transparent 75%, transparent);
      background-size: 1rem 1rem;
      animation: progress-stripes 1s linear infinite;
    }
    @keyframes progress-stripes {
      from { background-position: 1rem 0; }
      to { background-position: 0 0; }
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
            success: { 400: '#34d399', 500: '#10b981', 600: '#059669' },
            warning: { 400: '#fbbf24', 500: '#f59e0b' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-brand-50 min-h-screen text-slate-800 flex items-center justify-center p-4 selection:bg-brand-200">

              if (type === 1) {
                  let a = r(1, 5), b = r(1, 5), c = r(1, 3), d = c * r(-4, 4);
                  while (d === 0) d = c * r(-4, 4);
                  let x_asymptote = d / c;
                  v.push(x_asymptote);
                  q = `Tìm tiệm cận đứng của đồ thị hàm số: y = (${a}x + ${b}) / (${c === 1 ? '' : c}x ${d < 0 ? '+' : '-'} ${Math.abs(d)})`;
                  document.getElementById('formatHint').innerText = "Chỉ gõ giá trị x (ví dụ: 2)";
                  currentHint = `Tiệm cận đứng của hàm phân thức là nghiệm của mẫu số: ${c}x - ${d} = 0.`;
              } else {
                  let a = r(1, 3);
                  let c = r(-5, 5);
                  v.push(2);
                  q = `Hàm số bậc ba y = x³ - ${3*a}x² ${c < 0 ? '-' : '+'} ${Math.abs(c)} có bao nhiêu điểm cực trị?`;
                  currentHint = `Đạo hàm y' = 3x² - ${6*a}x = 0 có hai nghiệm phân biệt x = 0 và x = ${2*a}. Do đó hàm số luôn có 2 cực trị.`;
              }
              break;
          }
          case "12_2": {
              let type = r(1, 2);
              if (type === 1) {
                  let a = [2, 3, 5][r(0, 2)];
                  let exp = r(2, 4);
                  let b = Math.pow(a, exp);
                  v.push(exp);
                  q = `Tính giá trị của biểu thức logarit: log_${a}(${b}) = ?`;
                  currentHint = `log_a(a^k) = k. Hãy viết ${b} dưới dạng lũy thừa của ${a}.`;
              } else {
                  let a = [2, 3, 5][r(0, 2)];
                  let b = r(2, 3);
                  v.push(Math.pow(a, b));
                  q = `Giải phương trình logarit: log_${a}(x) = ${b}. Tìm x?`;
                  currentHint = `Định nghĩa logarit: log_a(x) = b <=> x = a^b.`;
              }
              break;
          }
          case "12_3": {
              let type = r(1, 2);
              if (type === 1) {
                  let k = r(2, 6);
                  while (k % 2 !== 0) k = r(2, 6);
                  let a = r(1, 4);
                  v.push((k/2) * a * a);
                  q = `Tính tích phân tích phân I = ∫₀<sup>${a}</sup> (${k}x) dx = ?`;
                  currentHint = `Nguyên hàm của ${k}x là ${(k/2)}x². Thế cận từ 0 đến ${a}: ${(k/2)} . ${a}² - 0.`;
              } else {
                  let n = r(2, 5);
                  v.push(n+1);
                  q = `Nếu F(x) là một nguyên hàm của f(x) = x<sup>${n}</sup> thì bậc của lũy thừa x trong F(x) là bao nhiêu?`;
                  currentHint = `Công thức nguyên hàm: ∫x^n dx = (x^(n+1)) / (n+1) + C. Bậc tăng lên 1 đơn vị.`;
              }
              break;
          }
          case "12_4": {
              let type = r(1, 2);
              if (type === 1) {
                  let a = r(-5, 5), b = r(-5, 5);
                  while (b === 0) b = r(-5, 5);
                  let askReal = r(0, 1);
                  v.push(askReal ? a : b);
                  q = `Cho số phức z = ${a} ${b < 0 ? '-' : '+'} ${Math.abs(b)}i. Hãy tìm phần ${askReal ? 'thực' : 'ảo'} của số phức z?`;
                  currentHint = `Số phức z = a + bi có phần thực là a, phần ảo là b (không bao gồm i).`;
              } else {
                  let choices = [[3, 4, 12, 13], [3, 4, 0, 5], [1, 2, 2, 3]];
                  let choice = choices[r(0, choices.length-1)];
                  let a = choice[0], b = choice[1], c = choice[2], d_div = choice[3];
                  let d = d_div * r(1, 3);
                  v.push(d / d_div);
                  q = `Trong không gian Oxyz, tính khoảng cách từ gốc tọa độ O(0;0;0) đến mặt phẳng (P): ${a}x + ${b}y ${c === 0 ? '' : '+ ' + c + 'z'} + ${d} = 0 ?`;
                  currentHint = `Công thức khoảng cách từ M(x₀,y₀,z₀) đến Ax+By+Cz+D=0 là: d = |Ax₀ + By₀ + Cz₀ + D| / √(A² + B² + C²).`;
              }
              break;
          }
          case "12_5": {
              let choices = [[2, 3, 6, 7], [1, 2, 2, 3], [2, 4, 4, 6], [2, 6, 9, 11]];
              let pair = choices[r(0, choices.length-1)];
              v.push(pair[3]);
              q = `Trong không gian Oxyz, tính độ dài (môđun) của vectơ u⃗ = (${pair[0]}; ${pair[1]}; ${pair[2]})?`;
              currentHint = `Công thức độ dài vectơ: |u⃗| = √(x² + y² + z²).`;
              break;
          }
          case "12_6": {
              let type = r(1, 2);
              if (type === 1) {
                  v.push(4); q = `Tìm giá trị nhỏ nhất (GTNN) của hàm số y = x² - 2x + 5 trên đoạn [0; 2]?`;
                  currentHint = `Đỉnh của parabol là x = 1 (thuộc đoạn [0; 2]). Giá trị nhỏ nhất đạt được tại đỉnh: y(1) = 1² - 2(1) + 5 = 4.`;
              } else {
                  v.push(5); q = `Tìm giá trị lớn nhất (GTLN) của hàm số y = -x² + 4x + 1 trên đoạn [0; 3]?`;
                  currentHint = `Đỉnh của parabol là x = 2 (thuộc đoạn [0; 3]). Giá trị lớn nhất đạt được tại đỉnh: y(2) = -(2²) + 4(2) + 1 = 5.`;
              }
              break;
          }
          default: { q="Lỗi tải đề. Hãy chọn dạng bài khác!"; v=["error"]; }
          }
      } else {
          let dataPool = [];
          if (subject === 'vietnamese') {
              dataPool = vietnameseData[currentTypeId] || [];
          } else if (subject === 'english') {
              dataPool = englishData[currentTypeId] || [];
          } else if (subject === 'science') {
              dataPool = scienceData[currentTypeId] || [];
          } else if (subject === 'physics') {
              dataPool = physicsData[currentTypeId] || [];
          } else if (subject === 'chemistry') {
              dataPool = chemistryData[currentTypeId] || [];
          } else if (subject === 'biology') {
              dataPool = biologyData[currentTypeId] || [];
          } else if (subject === 'history') {
              dataPool = historyData[currentTypeId] || [];
          }
          
          if (dataPool.length > 0) {
              let item = dataPool[r(0, dataPool.length - 1)];
              q = item.q;
              v = item.a;
              currentHint = item.h || "Con suy nghĩ kỹ nhé!";
              if (subject === 'vietnamese') {
                  document.getElementById('formatHint').innerText = "Gõ tiếng Việt có dấu đầy đủ.";
              } else if (subject === 'english') {
                  document.getElementById('formatHint').innerText = "Gõ bằng tiếng Anh.";
              } else if (subject === 'physics' || subject === 'chemistry' || subject === 'biology') {
                  document.getElementById('formatHint').innerText = "Gõ câu trả lời chính xác.";
              } else if (subject === 'history') {
                  document.getElementById('formatHint').innerText = "Gõ tiếng Việt có dấu đầy đủ.";
              } else {
                  document.getElementById('formatHint').innerText = "Gõ câu trả lời của con.";
              }
          } else {
              q = "Dạng bài này đang được cập nhật câu hỏi mới!";
              v = ["dang cap nhat"];
          }
      }

      currentAnswers = v.map(String).map(s => s.trim().toLowerCase());
      document.getElementById('question').innerHTML = q;
      answerInput.value = "";
      document.getElementById('message').innerText = "";
      answerInput.focus();
  }

  function check() {
      let inputEl = document.getElementById('answer');
      let raw = inputEl.value.trim().toLowerCase().replace(',', '.'); // Chuẩn hóa dấu phẩy thập phân
      if (!raw) {
          inputEl.focus();
          return;
      }

      let isCorrect = currentAnswers.some(ans => raw === ans.replace(',', '.') || raw.replace(/\s/g,'') === ans.replace(/\s/g,'').replace(',','.'));
      let time = Math.round((Date.now() - questionStartTime)/1000);
      let msgEl = document.getElementById('message');
      
      if (!isQuestionAttempted) {
          totalQuestions++; isQuestionAttempted = true;
          if (isCorrect) { correctQuestions++; if(errorTracker[currentTypeId]>0) errorTracker[currentTypeId]--; }
          else { errorTracker[currentTypeId] = (errorTracker[currentTypeId] || 0) + 1; }
      }

      if (isCorrect) {
          msgEl.innerHTML = `<span class="text-success-600">Hoàn hảo! 🎉 (+10 điểm) <span class="text-xs text-slate-400">(${time}s)</span></span>`;
          inputEl.classList.add('border-success-400', 'bg-success-50');
          inputEl.classList.remove('border-rose-400', 'bg-rose-50');
          score += 10; 
          updateScoreBoard();
          
          if (score >= 100 && !hasReceivedFlower) {
              hasReceivedFlower = true;
              document.getElementById('rewardTimeText').innerText = `Hoàn thành trong: ${formatTime(totalSeconds)}`;
              document.getElementById('rewardScreen').classList.remove('hidden');
              document.getElementById('rewardScreen').classList.add('flex');
              fireConfetti();
          } else { 
              setTimeout(newQuestion, 1500); 
          }
      } else {
          msgEl.innerHTML = `<span class="text-rose-500">Chưa chính xác rồi! Con xem lại nhé 👇</span>`;
          inputEl.classList.add('border-rose-400', 'bg-rose-50');
          inputEl.classList.remove('border-success-400', 'bg-success-50');
          
          // Shake effect
          let qc = document.getElementById('questionContainer');
          qc.classList.remove('shake');
          void qc.offsetWidth; // trigger reflow
          qc.classList.add('shake');

          // Show Hint
          document.getElementById('explanationText').innerText = currentHint;
          document.getElementById('explanationBox').classList.remove("hidden");
          
          // Change buttons
          document.getElementById('actionButtons').innerHTML = btnRetryHtml + btnNextHtml;
      }
  }

  function fireConfetti() {
      var duration = 3000;
      var end = Date.now() + duration;
      (function frame() {
          confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff'] });
          confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff'] });
          if (Date.now() < end) requestAnimationFrame(frame);
      }());
  }

  function drawScoreCanvas() {
      const canvas = document.createElement('canvas'); 
      canvas.width = 600; canvas.height = 320;
      const ctx = canvas.getContext('2d');
      
      // Draw background
      let grd = ctx.createLinearGradient(0, 0, 600, 320);
      grd.addColorStop(0, "#eff6ff"); grd.addColorStop(1, "#dbeafe");
      ctx.fillStyle = grd; ctx.fillRect(0,0,600,320);
      
      // Draw border
      ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 10; ctx.strokeRect(5,5,590,310);
      
      // Texts
      ctx.textAlign = "center";
      
      // Title
      ctx.font = '900 32px Nunito, Arial'; ctx.fillStyle = '#1d4ed8'; 
      ctx.fillText('🏆 BẢNG VÀNG XUÂN LÂM 🏆', 300, 55);
      
      // Timestamp
      const now = new Date();
      const dateStr = now.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
      const timeStr = now.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
      ctx.font = 'bold 14px Arial'; ctx.fillStyle = '#64748b'; 
      ctx.fillText(`Thời gian: ${timeStr} - ${dateStr}`, 300, 95);
      
      // Details
      ctx.font = 'bold 24px Arial'; ctx.fillStyle = '#334155'; 
      ctx.fillText(`🎯 Tỉ lệ đúng: ${correctQuestions} / ${totalQuestions} bài`, 300, 155);
      ctx.fillText(`⏱️ Thời gian ôn luyện: ${formatTime(totalSeconds)}`, 300, 205);
      
      // Score
      ctx.font = '900 40px Arial'; ctx.fillStyle = '#10b981'; 
      ctx.fillText(`Điểm số: ${score} Điểm`, 300, 275);

      return canvas;
  }

  async function captureScoreForZalo() {
      const canvas = drawScoreCanvas();
      canvas.toBlob(blob => {
          const item = new ClipboardItem({ 'image/png': blob });
          navigator.clipboard.write([item])
              .then(() => alert('🎉 Đã chụp xong! Con mở Zalo và dán (Paste) để gửi cho Ba nhé!'))
              .catch(() => window.open(canvas.toDataURL(), '_blank'));
      });
  }

  function downloadScoreImage() {
      const canvas = drawScoreCanvas();
      const dataUrl = canvas.toDataURL('image/png');
      const link = document.createElement('a');
      link.download = `BangVang_XuanLam_${score}diem.png`;
      link.href = dataUrl;
      link.click();
  }

  function closeReward() { 
      document.getElementById('rewardScreen').classList.add('hidden'); 
      document.getElementById('rewardScreen').classList.remove('flex'); 
      newQuestion(); 
  }
  
  function retryQuestion() { 
      document.getElementById('answer').value = ""; 
      document.getElementById('answer').classList.remove('border-rose-400', 'bg-rose-50');
      document.getElementById('message').innerText = ""; 
      document.getElementById('actionButtons').innerHTML = btnCheckHtml + btnNextHtml;
      document.getElementById('answer').focus(); 
      questionStartTime = Date.now(); 
  }

  // Init
  window.onload = () => { updateSubjectsDropdown(); };
  document.getElementById('answer').addEventListener('keypress', e => { if(e.key==='Enter') check(); });

</script>
