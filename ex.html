<!DOCTYPE html>
<html lang="vi" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tính Tổng Thông Minh - Z Office Mobile</title>
  
  <!-- CDNs: TailwindCSS, FontAwesome -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            excel: {
              50: '#f0fdf4',
              100: '#dcfce7',
              500: '#22c55e',
              600: '#16a34a',
              700: '#15803d',
              800: '#107c41',
              900: '#0b5a2f'
            }
          }
        }
      }
    }
  </script>

  <style>
    /* Custom Scrollbars */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    .grid-table-th {
      background-color: #f8fafc;
      color: #475569;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .grid-input {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      touch-action: manipulation;
    }
    .grid-input:focus {
      outline: 2.5px solid #107c41;
      outline-offset: -2.5px;
      background-color: #ffffff;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeIn 0.15s ease-out forwards; }
  </style>
</head>
<body class="h-full bg-slate-100 dark:bg-slate-950 text-slate-800 dark:text-slate-100 font-sans flex flex-col overflow-x-hidden pb-16 lg:pb-0 select-none">

  <!-- ==================== TOP HEADER ==================== -->
  <header class="bg-excel-800 text-white flex items-center justify-between px-3 sm:px-4 py-2 shadow-md z-30 flex-shrink-0">
    
    <!-- CLICK BRAND TITLE CLUSTER TO RELOAD PAGE (F5) -->
    <div onclick="location.reload()" title="Nhấp để tải lại trang (F5)" class="flex items-center space-x-2.5 overflow-hidden cursor-pointer hover:opacity-90 active:scale-95 transition-all">
      <div class="w-8 h-8 bg-white text-excel-800 rounded-lg flex items-center justify-center font-extrabold text-sm shadow-sm flex-shrink-0">
        <i class="fa-solid fa-calculator"></i>
      </div>
      <div class="overflow-hidden">
        <h1 class="font-bold text-xs sm:text-sm text-white truncate">Tính Tổng Thông Minh</h1>
        <div class="text-[10px] text-emerald-200">Z Office Mobile Edition</div>
      </div>
    </div>

    <!-- Right Header Controls -->
    <div class="flex items-center space-x-1.5 text-xs flex-shrink-0">
      <button onclick="resetCurrentTable()" title="Làm mới" class="p-2 sm:px-2.5 sm:py-1 bg-white/10 hover:bg-white/20 rounded font-medium transition flex items-center gap-1">
        <i class="fa-solid fa-rotate-right"></i> <span class="hidden sm:inline">Làm mới</span>
      </button>
      <button onclick="window.location.href='index.html'" title="Trở về Trang chủ" class="px-2.5 py-1 bg-white text-excel-800 font-bold hover:bg-slate-100 rounded shadow-sm transition flex items-center gap-1">
        <i class="fa-solid fa-arrow-left"></i> <span class="hidden sm:inline">Quay lại</span>
      </button>
    </div>
  </header>

  <!-- ==================== MAIN WORKSPACE ==================== -->
  <main class="flex-1 max-w-7xl w-full mx-auto p-2 sm:p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-3 md:gap-6 overflow-hidden">
    
    <!-- LEFT PANEL: CURRENT INPUT GRID (7 cols) -->
    <section class="lg:col-span-7 flex flex-col bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden flex-shrink-0">
      
      <!-- Card Header -->
      <div class="px-3 sm:px-4 py-2 bg-slate-50 dark:bg-slate-800/60 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between flex-shrink-0 z-20">
        <div class="flex items-center space-x-2">
          <i class="fa-solid fa-table text-excel-800 text-sm"></i>
          <h2 class="font-bold text-xs sm:text-sm text-slate-800 dark:text-slate-100">Bảng Nhập Dữ Liệu</h2>
        </div>
      </div>

      <!-- Grid Table Container (Compact max-height on mobile so 3 buttons NEVER get pushed down) -->
      <div class="max-h-[38vh] sm:max-h-[48vh] lg:max-h-[55vh] overflow-y-auto p-2 sm:p-3 relative flex-1">
        <div class="border border-slate-300 dark:border-slate-700 rounded-lg overflow-hidden shadow-xs">
          <table class="w-full text-left border-collapse">
            <thead class="sticky top-0 z-10 bg-slate-100 dark:bg-slate-800">
              <tr class="bg-slate-100 dark:bg-slate-800 border-b border-slate-300 dark:border-slate-700">
                <th class="py-2 px-2 text-center grid-table-th w-10 border-r border-slate-200 dark:border-slate-700">STT</th>
                <th class="py-2 px-3 grid-table-th">
                  <div class="flex items-center space-x-2">
                    <span>GIÁ TRỊ:</span>
                    <span id="currentTotal" class="font-mono font-extrabold text-excel-800 dark:text-emerald-400 text-sm sm:text-base bg-excel-50 dark:bg-slate-800 border border-excel-200 dark:border-slate-700 px-2 py-0.5 rounded shadow-xs">0</span>
                  </div>
                </th>
                <th class="py-2 px-2 text-center grid-table-th w-20">THAO TÁC</th>
              </tr>
            </thead>
            <tbody id="inputTableBody" class="divide-y divide-slate-200 dark:divide-slate-800">
              <!-- Dynamic Rows -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- DESKTOP ACTION BUTTONS BAR (DESKTOP ONLY) -->
      <div class="hidden lg:block p-3 bg-slate-50 dark:bg-slate-800 border-t border-slate-200 dark:border-slate-700 flex-shrink-0 z-20">
        <div class="grid grid-cols-3 gap-2">
          <button onclick="addRow(true)" class="py-2.5 px-2 bg-excel-800 hover:bg-excel-900 active:scale-95 text-white font-bold text-xs sm:text-sm rounded-xl shadow-md transition flex items-center justify-center gap-1">
            <i class="fa-solid fa-plus-circle"></i> + Dòng
          </button>
          <button onclick="splitGroup()" title="Phím tắt: Ctrl + S" class="py-2.5 px-2 bg-emerald-600 hover:bg-emerald-700 active:scale-95 text-white font-bold text-xs sm:text-sm rounded-xl shadow-md transition flex items-center justify-center gap-1">
            <i class="fa-solid fa-scissors"></i> Lưu Tách
          </button>
          <button onclick="mergeGroups()" title="Phím tắt: Ctrl + A" class="py-2.5 px-2 bg-sky-700 hover:bg-sky-800 active:scale-95 text-white font-bold text-xs sm:text-sm rounded-xl shadow-md transition flex items-center justify-center gap-1">
            <i class="fa-solid fa-object-group"></i> Gộp
          </button>
        </div>
      </div>
    </section>

    <!-- RIGHT PANEL: SPLIT HISTORY CARD (5 cols) -->
    <section id="historySection" class="lg:col-span-5 flex flex-col bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden flex-1 min-h-[180px] lg:min-h-0">
      <div class="px-3 sm:px-4 py-2 bg-slate-50 dark:bg-slate-800/60 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between flex-shrink-0">
        <h2 class="font-bold text-xs sm:text-sm text-slate-800 dark:text-slate-100 flex items-center gap-2">
          <i class="fa-solid fa-clock-rotate-left text-amber-600"></i> Lịch Sử Lần Tách
        </h2>
        <span id="historyBadge" class="bg-amber-100 text-amber-800 dark:bg-amber-900/40 dark:text-amber-300 text-xs font-bold px-2 py-0.5 rounded-full">0 phần</span>
      </div>

      <!-- History Items Scrollable Container -->
      <div id="historyContainer" class="flex-1 overflow-y-auto p-3 space-y-2">
        <div id="emptyHistoryState" class="flex flex-col items-center justify-center h-full text-center py-4 text-slate-400">
          <i class="fa-solid fa-box-open text-2xl text-slate-300 dark:text-slate-700 mb-1"></i>
          <p class="text-xs font-semibold text-slate-500">Chưa có phần nào được lưu tách.</p>
        </div>
      </div>
    </section>
  </main>

  <!-- ==================== MOBILE FLOATING ACTION BAR ==================== -->
  <div id="mobileFloatingActionBar" class="lg:hidden fixed bottom-0 left-0 right-0 bg-white/95 dark:bg-slate-900/95 backdrop-blur-md border-t border-slate-200 dark:border-slate-800 p-2 shadow-2xl z-50 transition-all duration-75">
    <div class="grid grid-cols-3 gap-2">
      <button onclick="addRow(true)" class="py-2.5 px-2 bg-excel-800 active:scale-95 text-white font-bold text-xs rounded-xl shadow-md flex items-center justify-center gap-1">
        <i class="fa-solid fa-plus-circle"></i> + Dòng
      </button>
      <button onclick="splitGroup()" class="py-2.5 px-2 bg-emerald-600 active:scale-95 text-white font-bold text-xs rounded-xl shadow-md flex items-center justify-center gap-1">
        <i class="fa-solid fa-scissors"></i> Lưu Tách
      </button>
      <button onclick="mergeGroups()" class="py-2.5 px-2 bg-sky-700 active:scale-95 text-white font-bold text-xs rounded-xl shadow-md flex items-center justify-center gap-1">
        <i class="fa-solid fa-object-group"></i> Gộp
      </button>
    </div>
  </div>

  <!-- ==================== MERGE RESULT MODAL ==================== -->
  <div id="mergeModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs z-50 flex items-center justify-center p-3 sm:p-5 opacity-0 pointer-events-none transition-opacity duration-200">
    <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-xl overflow-hidden flex flex-col border border-slate-300 dark:border-slate-700 transform scale-95 transition-transform duration-200" id="mergeModalContent">
      
      <!-- Modal Header with "Kết Quả Gộp", "Tất cả là:", and Plum Red Total -->
      <div class="px-4 py-3 bg-excel-800 text-white flex justify-between items-center flex-wrap gap-2">
        <div class="flex items-center space-x-2 flex-wrap text-sm sm:text-base font-bold">
          <i class="fa-solid fa-calculator text-lg text-emerald-200"></i>
          <span class="font-extrabold text-white">Kết Quả Gộp</span>
          <span class="text-amber-300 text-base sm:text-lg font-black ml-1.5">Tất cả là:</span>
          <span id="modalGrandTotal" class="text-xl sm:text-2xl font-black font-mono text-[#800020] bg-amber-50 border border-amber-200 px-3 py-0.5 rounded-lg shadow-sm">0</span>
        </div>
        <button onclick="closeModal()" class="text-white/80 hover:text-white text-xl font-bold p-1 active:scale-90 transition"><i class="fa-solid fa-xmark"></i></button>
      </div>

      <!-- Modal Body (Line-by-line listing of split histories) -->
      <div class="p-4 sm:p-5 overflow-y-auto max-h-[75vh] bg-slate-50 dark:bg-slate-950">
        <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2.5">Danh Sách Các Lần Tách Chi Tiết:</h3>
        <div id="modalBreakdown" class="space-y-2.5">
          <!-- Breakdowns rendered in JS -->
        </div>
      </div>

      <!-- Modal Footer -->
      <div class="px-4 py-2.5 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 flex justify-end">
        <button onclick="closeModal()" class="px-5 py-2 bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold text-xs rounded-xl transition active:scale-95">Đóng</button>
      </div>
    </div>
  </div>

  <!-- JAVASCRIPT ENGINE -->
  <script>
    let rowCount = 0;
    let separatedGroups = [];

    const tableBody = document.getElementById("inputTableBody");
    const currentTotalEl = document.getElementById("currentTotal");
    const historyContainer = document.getElementById("historyContainer");
    const emptyHistoryState = document.getElementById("emptyHistoryState");
    const historyBadge = document.getElementById("historyBadge");

    const formatNumber = (num) => isNaN(num) ? "0" : new Intl.NumberFormat('vi-VN').format(num);

    window.addEventListener('DOMContentLoaded', () => {
      renderCurrentTable();
      renderHistory();
      setupKeyboardShortcuts();
      setupMobileViewportSync();
    });

    /* DYNAMIC VISUAL VIEWPORT SYNC: LOCK 3 BUTTONS EXACTLY AT TOP EDGE OF MOBILE VIRTUAL KEYBOARD */
    function setupMobileViewportSync() {
      const updateMobileBarPosition = () => {
        const bar = document.getElementById('mobileFloatingActionBar');
        if (!bar) return;
        if (window.visualViewport && window.innerWidth < 1024) {
          const keyboardHeight = window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop;
          bar.style.bottom = `${Math.max(0, keyboardHeight)}px`;
        } else {
          bar.style.bottom = '0px';
        }
      };

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', updateMobileBarPosition);
        window.visualViewport.addEventListener('scroll', updateMobileBarPosition);
      }
    }

    function setupKeyboardShortcuts() {
      document.addEventListener('keydown', (e) => {
        if (e.ctrlKey || e.metaKey) {
          if (e.key === 's' || e.key === 'S') {
            e.preventDefault();
            splitGroup();
          } else if (e.key === 'a' || e.key === 'A') {
            e.preventDefault();
            mergeGroups();
          }
        }
      });
    }

    function renderCurrentTable() {
      if (tableBody.children.length === 0) {
        addRow(false);
      } else {
        updateRowNumbers();
        calculateCurrentTotal();
      }
    }

    function addRow(focus = true) {
      rowCount++;
      const tr = document.createElement("tr");
      tr.className = "group hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors animate-fade-in";
      tr.innerHTML = `
        <td class="py-1.5 px-2 text-center text-slate-400 font-mono text-xs border-r border-slate-200 dark:border-slate-700 row-number"></td>
        <td class="py-1 px-2">
          <input type="number" 
                 inputmode="decimal"
                 class="value-input grid-input w-full px-2.5 py-1.5 bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded text-base font-semibold text-slate-800 dark:text-slate-100 placeholder-slate-300" 
                 placeholder="0"
                 oninput="calculateCurrentTotal()" 
                 onkeydown="handleKeyDown(event, this)">
        </td>
        <td class="py-1 px-2 text-center action-cell">
          <!-- Action Buttons rendered dynamically in updateRowNumbers -->
        </td>
      `;
      tableBody.appendChild(tr);
      updateRowNumbers();
      calculateCurrentTotal();

      if (focus) {
        const input = tr.querySelector('.value-input');
        if (input) {
          input.focus();
          setTimeout(() => {
            input.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
          }, 100);
        }
      }
    }

    function deleteRow(btn) {
      if (tableBody.children.length > 1) {
        const tr = btn.closest("tr");
        tr.remove();
        updateRowNumbers();
        calculateCurrentTotal();
      } else {
        tableBody.querySelector('.value-input').value = "";
        calculateCurrentTotal();
      }
    }

    /* UPDATE ROW NUMBERS & RENDER '+' BUTTON ONLY ON THE LAST ROW */
    function updateRowNumbers() {
      const rows = tableBody.querySelectorAll("tr");
      rows.forEach((row, index) => {
        row.querySelector(".row-number").textContent = index + 1;

        const actionCell = row.querySelector(".action-cell");
        if (actionCell) {
          const isLast = (index === rows.length - 1);
          if (isLast) {
            actionCell.innerHTML = `
              <div class="flex items-center justify-center space-x-1">
                <button onclick="addRow(true)" class="p-1.5 bg-emerald-100 dark:bg-slate-800 text-excel-800 dark:text-emerald-400 hover:bg-emerald-200 rounded font-bold text-xs" title="Thêm dòng mới">
                  <i class="fa-solid fa-plus"></i>
                </button>
                <button onclick="deleteRow(this)" class="p-1.5 text-slate-400 hover:text-rose-600 rounded transition" title="Xóa dòng">
                  <i class="fa-solid fa-trash-can"></i>
                </button>
              </div>
            `;
          } else {
            actionCell.innerHTML = `
              <div class="flex items-center justify-center space-x-1">
                <button onclick="deleteRow(this)" class="p-1.5 text-slate-400 hover:text-rose-600 rounded transition" title="Xóa dòng">
                  <i class="fa-solid fa-trash-can"></i>
                </button>
              </div>
            `;
          }
        }
      });
    }

    function handleKeyDown(event, inputElement) {
      if (event.key === "Enter") {
        event.preventDefault();
        addRow(true);
      }
    }

    function calculateCurrentTotal() {
      let sum = 0;
      const inputs = tableBody.querySelectorAll(".value-input");
      inputs.forEach(input => {
        const val = parseFloat(input.value);
        if (!isNaN(val)) sum += val;
      });
      const formatted = formatNumber(sum);
      currentTotalEl.textContent = formatted;
      return sum;
    }

    function resetCurrentTable() {
      tableBody.innerHTML = '';
      addRow(true);
      calculateCurrentTotal();
    }

    /* SPLIT GROUP - AUTOMATICALLY DISMISSES MOBILE KEYBOARD & SCROLLS TO HISTORY */
    function splitGroup() {
      // 1. DISMISS MOBILE KEYBOARD IMMEDIATELY
      if (document.activeElement) document.activeElement.blur();

      const inputs = tableBody.querySelectorAll(".value-input");
      const values = [];
      let sum = 0;
      
      inputs.forEach(input => {
        const val = parseFloat(input.value);
        if (!isNaN(val)) {
          values.push(val);
          sum += val;
        }
      });

      if (values.length === 0 || sum === 0) {
        alert("Bảng hiện tại chưa có giá trị hợp lệ để tách.");
        return;
      }

      separatedGroups.push({
        id: Date.now(),
        values: values,
        total: sum
      });

      renderHistory();
      resetCurrentTable();

      // 2. SMOOTH SCROLL TO HISTORY PANEL ON MOBILE
      if (window.innerWidth < 1024) {
        const historySec = document.getElementById('historySection');
        if (historySec) {
          setTimeout(() => {
            historySec.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }, 150);
        }
      }
    }

    function renderHistory() {
      if (separatedGroups.length === 0) {
        emptyHistoryState.style.display = 'flex';
        historyBadge.textContent = `0 phần`;
        return;
      }
      
      emptyHistoryState.style.display = 'none';
      historyBadge.textContent = `${separatedGroups.length} phần`;

      const cards = historyContainer.querySelectorAll('.history-card');
      cards.forEach(c => c.remove());

      [...separatedGroups].reverse().forEach((group, index) => {
        const groupNum = separatedGroups.length - index;
        const card = document.createElement("div");
        card.className = "history-card bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg p-2.5 shadow-xs animate-fade-in relative group hover:border-excel-800 transition";

        card.innerHTML = `
          <div class="flex justify-between items-center mb-1.5">
            <h3 class="font-bold text-xs text-slate-700 dark:text-slate-200 flex items-center gap-1">
              <span class="w-2 h-2 rounded-full bg-excel-800"></span> Lần tách ${groupNum}
            </h3>
            <span class="text-xs font-bold font-mono text-excel-800 dark:text-emerald-400 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 px-1.5 py-0.5 rounded">${formatNumber(group.total)}</span>
          </div>
          <div class="flex flex-wrap gap-1">
            ${group.values.map(v => `<span class="inline-block bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 text-[11px] px-1.5 py-0.5 rounded font-mono">${formatNumber(v)}</span>`).join('')}
          </div>
          <button onclick="deleteHistoryGroup(${group.id})" class="absolute top-2 right-2 p-1 text-slate-300 hover:text-rose-600 rounded opacity-0 group-hover:opacity-100 transition" title="Xóa">
            <i class="fa-solid fa-xmark"></i>
          </button>
        `;
        historyContainer.appendChild(card);
      });
    }

    function deleteHistoryGroup(id) {
      separatedGroups = separatedGroups.filter(g => g.id !== id);
      renderHistory();
    }

    /* MERGE GROUPS - AUTOMATICALLY DISMISSES MOBILE KEYBOARD & RENDERS REDESIGN MODAL */
    function mergeGroups() {
      // 1. DISMISS MOBILE KEYBOARD IMMEDIATELY
      if (document.activeElement) document.activeElement.blur();

      if (separatedGroups.length === 0) {
        alert("Chưa có phần tách nào để thực hiện gộp.");
        return;
      }
      
      const modal = document.getElementById("mergeModal");
      const modalContent = document.getElementById("mergeModalContent");
      const grandTotalEl = document.getElementById("modalGrandTotal");
      const breakdownEl = document.getElementById("modalBreakdown");
      
      let grandTotal = 0;
      breakdownEl.innerHTML = '';
      
      separatedGroups.forEach((group, index) => {
        grandTotal += group.total;
        
        const block = document.createElement("div");
        block.className = "bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-3 shadow-xs flex flex-col sm:flex-row sm:items-center justify-between gap-2";
        block.innerHTML = `
          <div class="flex items-center space-x-2">
            <span class="font-bold text-slate-800 dark:text-slate-200 text-sm">Lần tách ${index + 1}:</span>
            <div class="flex flex-wrap gap-1">
              ${group.values.map(v => `<span class="inline-block text-slate-700 dark:text-slate-300 text-xs font-bold bg-slate-100 dark:bg-slate-800 px-2 py-0.5 rounded-md font-mono">${formatNumber(v)}</span>`).join('')}
            </div>
          </div>
          <div class="text-right flex-shrink-0 pt-1 sm:pt-0 border-t sm:border-t-0 border-slate-100 dark:border-slate-800">
            <span class="text-xs text-slate-400 font-semibold mr-1">TỔNG:</span>
            <span class="font-bold font-mono text-excel-800 dark:text-emerald-400 text-base sm:text-lg">${formatNumber(group.total)}</span>
          </div>
        `;
        breakdownEl.appendChild(block);
      });
      
      grandTotalEl.textContent = formatNumber(grandTotal);
      
      modal.classList.remove("opacity-0", "pointer-events-none");
      modalContent.classList.remove("scale-95");
    }

    function closeModal() {
      const modal = document.getElementById("mergeModal");
      const modalContent = document.getElementById("mergeModalContent");
      if (modal) modal.classList.add("opacity-0", "pointer-events-none");
      if (modalContent) modalContent.classList.add("scale-95");
    }
  </script>
</body>
</html>
