<!DOCTYPE html>
<html lang="vi" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tính Tổng Thông Minh - Microsoft Office Style (Mobile & Desktop)</title>
  
  <!-- CDNs: TailwindCSS, FontAwesome -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            excel: {
              50: '#f0fdf4',
              100: '#dcfce7',
              500: '#22c55e',
              600: '#16a34a',
              700: '#15803d',
              800: '#107c41',
              900: '#0b5a2f'
            }
          }
        }
      }
    }
  </script>

  <style>
    /* Custom Scrollbars */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    .ribbon-tab {
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
    }
    .ribbon-tab.active {
      color: #107c41;
      border-bottom-color: #107c41;
      background-color: rgba(16, 124, 65, 0.08);
    }

    .grid-table-th {
      background-color: #f8fafc;
      color: #475569;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .grid-input {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      touch-action: manipulation;
    }
    .grid-input:focus {
      outline: 2px solid #107c41;
      outline-offset: -2px;
      background-color: #ffffff;
    }

    .horizontal-scroll-touch {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .horizontal-scroll-touch::-webkit-scrollbar { display: none; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
  </style>
</head>
<body class="h-full bg-slate-100 dark:bg-slate-950 text-slate-800 dark:text-slate-100 font-sans flex flex-col overflow-x-hidden pb-20 lg:pb-0 select-none">

  <!-- ==================== TOP HEADER ==================== -->
  <header class="bg-excel-800 text-white flex items-center justify-between px-3 sm:px-4 py-2 shadow-md z-30">
    <div class="flex items-center space-x-2.5 overflow-hidden">
      <div class="w-8 h-8 bg-white text-excel-800 rounded-lg flex items-center justify-center font-extrabold text-sm shadow-sm flex-shrink-0">
        <i class="fa-solid fa-calculator"></i>
      </div>
      <div class="overflow-hidden">
        <h1 class="font-bold text-xs sm:text-sm text-white truncate">Tính Tổng Thông Minh</h1>
        <div class="text-[10px] text-emerald-200">MS Office Mobile Edition</div>
      </div>
    </div>

    <!-- Right Header Controls -->
    <div class="flex items-center space-x-1.5 text-xs flex-shrink-0">
      <button onclick="resetCurrentTable()" title="Làm mới" class="p-2 sm:px-2.5 sm:py-1 bg-white/10 hover:bg-white/20 rounded font-medium transition flex items-center gap-1">
        <i class="fa-solid fa-rotate-right"></i> <span class="hidden sm:inline">Làm mới</span>
      </button>
      <button onclick="window.location.href='index.html'" title="Trở về Trang chủ" class="px-2.5 py-1 bg-white text-excel-800 font-bold hover:bg-slate-100 rounded shadow-sm transition flex items-center gap-1">
        <i class="fa-solid fa-arrow-left"></i> <span class="hidden sm:inline">Quay lại</span>
      </button>
    </div>
  </header>

  <!-- ==================== RIBBON NAVIGATION ==================== -->
  <div class="bg-slate-50 dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 p-2 shadow-inner z-20 text-xs flex items-center horizontal-scroll-touch">
    <div class="flex items-center space-x-2 flex-nowrap w-full justify-between">
      <div class="flex items-center space-x-2">
        <button onclick="addRow(true)" class="px-3 py-1.5 bg-excel-800 hover:bg-excel-900 text-white font-bold rounded flex items-center gap-1.5 shadow-sm text-xs flex-shrink-0">
          <i class="fa-solid fa-plus"></i> Thêm Dòng (`Enter`)
        </button>
        <button onclick="resetCurrentTable()" class="px-2.5 py-1.5 bg-slate-200 dark:bg-slate-800 hover:bg-rose-100 hover:text-rose-700 rounded font-semibold text-slate-700 dark:text-slate-300 flex-shrink-0">
          <i class="fa-solid fa-trash-can"></i> Xóa
        </button>
      </div>

      <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-1 text-[11px] font-medium flex-shrink-0">
        Tổng: <span id="lblHeaderTotal" class="font-bold text-excel-800 dark:text-emerald-400">0</span>
      </div>
    </div>
  </div>

  <!-- ==================== MAIN WORKSPACE ==================== -->
  <main class="flex-1 max-w-7xl w-full mx-auto p-3 sm:p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-4 md:gap-6 overflow-hidden">
    
    <!-- LEFT PANEL: CURRENT INPUT GRID (7 cols) -->
    <section class="lg:col-span-7 flex flex-col bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
      <div class="px-3 sm:px-4 py-2.5 bg-slate-50 dark:bg-slate-800/60 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
        <h2 class="font-bold text-xs sm:text-sm text-slate-800 dark:text-slate-100 flex items-center gap-1.5">
          <i class="fa-solid fa-table text-excel-800"></i> Bảng Nhập Dữ Liệu
        </h2>
        <span class="text-[11px] text-slate-400 font-mono">Dòng: <span id="lblRowCount">1</span></span>
      </div>

      <!-- Grid Table -->
      <div class="flex-1 overflow-y-auto p-3 sm:p-4">
        <div class="border border-slate-300 dark:border-slate-700 rounded-lg overflow-hidden shadow-xs">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-slate-100 dark:bg-slate-800 border-b border-slate-300 dark:border-slate-700">
                <th class="py-2 px-2 text-center grid-table-th w-12 border-r border-slate-200 dark:border-slate-700">STT</th>
                <th class="py-2 px-3 grid-table-th">Giá trị / Số tiền</th>
                <th class="py-2 px-2 text-center grid-table-th w-12">Xóa</th>
              </tr>
            </thead>
            <tbody id="inputTableBody" class="divide-y divide-slate-200 dark:divide-slate-800">
              <!-- Dynamic Rows -->
            </tbody>
          </table>
        </div>

        <div class="mt-3 flex items-center justify-between">
          <button onclick="addRow(true)" class="px-3 py-1.5 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 text-excel-800 font-bold text-xs rounded-lg transition flex items-center gap-1 border border-slate-200 dark:border-slate-700">
            <i class="fa-solid fa-plus-circle"></i> Thêm dòng mới
          </button>
          
          <div class="bg-excel-50 dark:bg-slate-800 border border-excel-200 dark:border-slate-700 rounded-lg px-3 py-1.5 text-right">
            <span class="text-[10px] text-slate-500 font-semibold mr-1">TỔNG CỘNG:</span>
            <span id="currentTotal" class="text-xl sm:text-2xl font-extrabold text-excel-800 dark:text-emerald-400 font-mono">0</span>
          </div>
        </div>
      </div>

      <!-- Actions Desktop Footer -->
      <div class="hidden lg:flex px-4 py-3 bg-slate-50 dark:bg-slate-800/60 border-t border-slate-200 dark:border-slate-800 justify-end space-x-3">
        <button onclick="splitGroup()" class="px-5 py-2 bg-white border-2 border-excel-800 text-excel-800 font-bold text-xs rounded-lg shadow-sm transition flex items-center gap-2">
          <i class="fa-solid fa-scissors"></i> Lưu Tách (Split)
        </button>
        <button onclick="mergeGroups()" class="px-5 py-2 bg-excel-800 text-white font-bold text-xs rounded-lg shadow-md transition flex items-center gap-2">
          <i class="fa-solid fa-object-group"></i> Gộp Tất Cả (Merge)
        </button>
      </div>
    </section>

    <!-- RIGHT PANEL: SPLIT HISTORY (5 cols) -->
    <section class="lg:col-span-5 flex flex-col bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden min-h-[250px]">
      <div class="px-3 sm:px-4 py-2.5 bg-slate-50 dark:bg-slate-800/60 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
        <h2 class="font-bold text-xs sm:text-sm text-slate-800 dark:text-slate-100 flex items-center gap-2">
          <i class="fa-solid fa-clock-rotate-left text-amber-600"></i> Lịch Sử Lần Tách
        </h2>
        <span id="historyBadge" class="bg-amber-100 text-amber-800 dark:bg-amber-900/40 dark:text-amber-300 text-xs font-bold px-2 py-0.5 rounded-full">0 phần</span>
      </div>

      <div id="historyContainer" class="flex-1 overflow-y-auto p-3 sm:p-4 space-y-2.5">
        <div id="emptyHistoryState" class="flex flex-col items-center justify-center h-full text-center py-8 text-slate-400">
          <i class="fa-solid fa-box-open text-3xl text-slate-300 dark:text-slate-700 mb-2"></i>
          <p class="text-xs font-semibold text-slate-500">Chưa có phần nào được lưu tách.</p>
        </div>
      </div>
    </section>
  </main>

  <!-- ==================== MOBILE FLOATING STICKY BOTTOM ACTION BAR ==================== -->
  <div class="lg:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 p-2.5 shadow-2xl z-40 flex items-center space-x-2">
    <button onclick="splitGroup()" class="flex-1 py-2.5 bg-white dark:bg-slate-800 border-2 border-excel-800 text-excel-800 font-bold text-xs rounded-xl shadow-xs flex items-center justify-center gap-1.5 active:bg-excel-50">
      <i class="fa-solid fa-scissors"></i> Lưu Tách
    </button>
    <button onclick="mergeGroups()" class="flex-1 py-2.5 bg-excel-800 hover:bg-excel-900 text-white font-bold text-xs rounded-xl shadow-md flex items-center justify-center gap-1.5 active:bg-excel-900">
      <i class="fa-solid fa-object-group"></i> Gộp Tất Cả
    </button>
  </div>

  <!-- ==================== MERGE RESULT MODAL ==================== -->
  <div id="mergeModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs z-50 flex items-center justify-center p-3 opacity-0 pointer-events-none transition-opacity duration-200">
    <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-xl overflow-hidden flex flex-col border border-slate-300 dark:border-slate-700 transform scale-95 transition-transform duration-200" id="mergeModalContent">
      <div class="px-4 py-3 bg-excel-800 text-white flex justify-between items-center">
        <h2 class="text-sm font-bold flex items-center gap-2">
          <i class="fa-solid fa-calculator text-base"></i> Kết Quả Gộp Dữ Liệu
        </h2>
        <button onclick="closeModal()" class="text-white/80 hover:text-white text-base font-bold p-1"><i class="fa-solid fa-xmark"></i></button>
      </div>

      <div class="p-4 overflow-y-auto max-h-[70vh] bg-slate-50 dark:bg-slate-950">
        <div class="bg-gradient-to-r from-excel-800 to-emerald-700 rounded-xl p-4 text-white text-center shadow-lg mb-4">
          <p class="text-[10px] font-semibold text-emerald-200 uppercase tracking-widest mb-1">TỔNG CỘNG TOÀN BỘ</p>
          <div id="modalGrandTotal" class="text-3xl font-black font-mono">0</div>
        </div>

        <h3 class="text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-2">Chi tiết các lần tách</h3>
        <div id="modalBreakdown" class="grid grid-cols-1 sm:grid-cols-2 gap-2.5">
          <!-- Breakdowns -->
        </div>
      </div>

      <div class="px-4 py-2.5 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 flex justify-end">
        <button onclick="closeModal()" class="px-4 py-1.5 bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold text-xs rounded-lg transition">Đóng</button>
      </div>
    </div>
  </div>

  <!-- JAVASCRIPT ENGINE -->
  <script>
    let rowCount = 0;
    let separatedGroups = [];

    const tableBody = document.getElementById("inputTableBody");
    const currentTotalEl = document.getElementById("currentTotal");
    const lblHeaderTotal = document.getElementById("lblHeaderTotal");
    const lblRowCount = document.getElementById("lblRowCount");
    const historyContainer = document.getElementById("historyContainer");
    const emptyHistoryState = document.getElementById("emptyHistoryState");
    const historyBadge = document.getElementById("historyBadge");

    const formatNumber = (num) => isNaN(num) ? "0" : new Intl.NumberFormat('vi-VN').format(num);

    window.addEventListener('DOMContentLoaded', () => {
      renderCurrentTable();
      renderHistory();
    });

    function renderCurrentTable() {
      if (tableBody.children.length === 0) {
        addRow(false);
      }
      updateRowNumbers();
      calculateCurrentTotal();
    }

    function addRow(focus = true) {
      rowCount++;
      const tr = document.createElement("tr");
      tr.className = "group hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors animate-fade-in";
      tr.innerHTML = `
        <td class="py-1.5 px-2 text-center text-slate-400 font-mono text-xs border-r border-slate-200 dark:border-slate-700 row-number"></td>
        <td class="py-1 px-2">
          <input type="number" 
                 inputmode="decimal"
                 class="value-input grid-input w-full px-2.5 py-1.5 bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded text-base font-semibold text-slate-800 dark:text-slate-100 placeholder-slate-300" 
                 placeholder="0"
                 oninput="calculateCurrentTotal()" 
                 onkeydown="handleKeyDown(event, this)">
        </td>
        <td class="py-1 px-2 text-center">
          <button onclick="deleteRow(this)" class="p-1.5 text-slate-400 hover:text-rose-600 rounded transition" title="Xóa dòng">
            <i class="fa-solid fa-trash-can"></i>
          </button>
        </td>
      `;
      tableBody.appendChild(tr);
      updateRowNumbers();

      if (focus) {
        const input = tr.querySelector('.value-input');
        if (input) input.focus();
      }
    }

    function deleteRow(btn) {
      if (tableBody.children.length > 1) {
        const tr = btn.closest("tr");
        tr.remove();
        updateRowNumbers();
        calculateCurrentTotal();
      } else {
        tableBody.querySelector('.value-input').value = "";
        calculateCurrentTotal();
      }
    }

    function updateRowNumbers() {
      const rows = tableBody.querySelectorAll("tr");
      rows.forEach((row, index) => {
        row.querySelector(".row-number").textContent = index + 1;
      });
      lblRowCount.textContent = rows.length;
    }

    function handleKeyDown(event, inputElement) {
      if (event.key === "Enter") {
        event.preventDefault();
        addRow(true);
      }
    }

    function calculateCurrentTotal() {
      let sum = 0;
      const inputs = tableBody.querySelectorAll(".value-input");
      inputs.forEach(input => {
        const val = parseFloat(input.value);
        if (!isNaN(val)) sum += val;
      });
      const formatted = formatNumber(sum);
      currentTotalEl.textContent = formatted;
      lblHeaderTotal.textContent = formatted;
      return sum;
    }

    function resetCurrentTable() {
      tableBody.innerHTML = '';
      addRow(true);
      calculateCurrentTotal();
    }

    function splitGroup() {
      const inputs = tableBody.querySelectorAll(".value-input");
      const values = [];
      let sum = 0;
      
      inputs.forEach(input => {
        const val = parseFloat(input.value);
        if (!isNaN(val)) {
          values.push(val);
          sum += val;
        }
      });

      if (values.length === 0 || sum === 0) {
        alert("Bảng hiện tại chưa có giá trị hợp lệ để tách.");
        return;
      }

      separatedGroups.push({
        id: Date.now(),
        values: values,
        total: sum
      });

      renderHistory();
      resetCurrentTable();
    }

    function renderHistory() {
      if (separatedGroups.length === 0) {
        emptyHistoryState.style.display = 'flex';
        historyBadge.textContent = `0 phần`;
        return;
      }
      
      emptyHistoryState.style.display = 'none';
      historyBadge.textContent = `${separatedGroups.length} phần`;

      const cards = historyContainer.querySelectorAll('.history-card');
      cards.forEach(c => c.remove());

      [...separatedGroups].reverse().forEach((group, index) => {
        const groupNum = separatedGroups.length - index;
        const card = document.createElement("div");
        card.className = "history-card bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg p-2.5 shadow-xs animate-fade-in relative group hover:border-excel-800 transition";

        card.innerHTML = `
          <div class="flex justify-between items-center mb-1.5">
            <h3 class="font-bold text-xs text-slate-700 dark:text-slate-200 flex items-center gap-1">
              <span class="w-2 h-2 rounded-full bg-excel-800"></span> Lần tách ${groupNum}
            </h3>
            <span class="text-xs font-bold font-mono text-excel-800 dark:text-emerald-400 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 px-1.5 py-0.5 rounded">${formatNumber(group.total)}</span>
          </div>
          <div class="flex flex-wrap gap-1">
            ${group.values.map(v => `<span class="inline-block bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 text-[11px] px-1.5 py-0.5 rounded font-mono">${formatNumber(v)}</span>`).join('')}
          </div>
          <button onclick="deleteHistoryGroup(${group.id})" class="absolute top-2 right-2 p-1 text-slate-300 hover:text-rose-600 rounded opacity-0 group-hover:opacity-100 transition" title="Xóa">
            <i class="fa-solid fa-xmark"></i>
          </button>
        `;
        historyContainer.appendChild(card);
      });
    }

    function deleteHistoryGroup(id) {
      separatedGroups = separatedGroups.filter(g => g.id !== id);
      renderHistory();
    }

    function mergeGroups() {
      if (separatedGroups.length === 0) {
        alert("Chưa có phần tách nào để thực hiện gộp.");
        return;
      }
      
      const modal = document.getElementById("mergeModal");
      const modalContent = document.getElementById("mergeModalContent");
      const grandTotalEl = document.getElementById("modalGrandTotal");
      const breakdownEl = document.getElementById("modalBreakdown");
      
      let grandTotal = 0;
      breakdownEl.innerHTML = '';
      
      separatedGroups.forEach((group, index) => {
        grandTotal += group.total;
        
        const block = document.createElement("div");
        block.className = "bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg p-2.5 shadow-xs";
        block.innerHTML = `
          <div class="flex justify-between items-center mb-1 border-b border-slate-100 dark:border-slate-800 pb-1">
            <span class="font-bold text-slate-700 dark:text-slate-300 text-xs">Lần tách ${index + 1}</span>
            <span class="font-bold font-mono text-excel-800 dark:text-emerald-400 text-xs sm:text-sm">${formatNumber(group.total)}</span>
          </div>
          <div class="flex flex-wrap gap-1">
            ${group.values.map(v => `<span class="inline-block text-slate-500 dark:text-slate-400 text-[10px] bg-slate-50 dark:bg-slate-800 px-1 py-0.5 rounded font-mono">${formatNumber(v)}</span>`).join(', ')}
          </div>
        `;
        breakdownEl.appendChild(block);
      });
      
      grandTotalEl.textContent = formatNumber(grandTotal);
      
      modal.classList.remove("opacity-0", "pointer-events-none");
      modalContent.classList.remove("scale-95");
    }

    function closeModal() {
      const modal = document.getElementById("mergeModal");
      const modalContent = document.getElementById("mergeModalContent");
      modal.classList.add("opacity-0", "pointer-events-none");
      modalContent.classList.add("scale-95");
    }
  </script>
</body>
</html>
